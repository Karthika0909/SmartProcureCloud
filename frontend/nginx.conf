# SmartProcure — nginx config for the Vue SPA container
# Serves the Vite build output and proxies /api to the backend k8s Service.

server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # --- compression ---
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css text/javascript application/javascript
                      application/json application/xml image/svg+xml;

    # --- basic security headers ---
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # --- k8s probe target (local, does not hit backend) ---
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # --- API proxy to the backend Service ---
    # backend-service:4000 is resolved via kube-dns inside the cluster.
    location /api/ {
        proxy_pass              http://backend-service:4000;
        proxy_http_version      1.1;
        proxy_set_header        Host               $host;
        proxy_set_header        X-Real-IP          $remote_addr;
        proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto  $scheme;
        proxy_connect_timeout   5s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;
    }

    # --- long-lived cache for Vite-hashed assets ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Vue Router history mode: any unknown path returns index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
