# ============================================================
# SmartProcure — AKS manifests
# Split: namespace, secret, backend Deployment/Service, frontend Deployment/Service
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: smartprocure

---
# ------------------------------------------------------------
# Azure AD + backend runtime config
# Rotate via `kubectl apply` after editing.
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: azure-ad-config
  namespace: smartprocure
type: Opaque
stringData:
  AZURE_CLIENT_ID: "3ea48b59-7c9b-487e-8e90-ade7b7a0caa2"
  AZURE_TENANT_ID: "98587403-b531-456c-8d95-84d5d6845a6a"
  NODE_ENV:        "production"
  PORT:            "4000"
  # Comma-separated origins allowed to call /api.
  # Replace with the frontend LoadBalancer DNS / custom domain once assigned.
  CORS_ORIGINS:    "http://localhost:5173"

---
# ============================================================
# Backend — Node.js / Express, validates Azure AD id tokens
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: smartprocure
  labels:
    app: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: smartprocureacr.azurecr.io/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - secretRef:
                name: azure-ad-config
          resources:
            requests:
              memory: "128Mi"
              cpu:    "100m"
            limits:
              memory: "256Mi"
              cpu:    "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: smartprocure
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 4000
      targetPort: http

---
# ============================================================
# Frontend — Vue SPA served by nginx, proxies /api → backend
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: smartprocure
  labels:
    app: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: smartprocureacr.azurecr.io/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu:    "50m"
            limits:
              memory: "128Mi"
              cpu:    "100m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: smartprocure
  labels:
    app: frontend
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
