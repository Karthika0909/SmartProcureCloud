name: Build and Deploy to AKS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  ACR_NAME:     smartprocureacr
  ACR_LOGIN:    smartprocureacr.azurecr.io
  AKS_RG:       smartprocure-rg
  AKS_CLUSTER:  smartprocure-aks
  K8S_NS:       smartprocure

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ACR_LOGIN }}/frontend:${{ github.sha }}
            ${{ env.ACR_LOGIN }}/frontend:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN }}/frontend:buildcache
          cache-to:   type=registry,ref=${{ env.ACR_LOGIN }}/frontend:buildcache,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN }}/backend:${{ github.sha }}
            ${{ env.ACR_LOGIN }}/backend:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN }}/backend:buildcache
          cache-to:   type=registry,ref=${{ env.ACR_LOGIN }}/backend:buildcache,mode=max

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name:   ${{ env.AKS_CLUSTER }}

      - name: Apply manifests
        run: kubectl apply -f k8s/manifests.yml

      - name: Roll out new images (SHA-tagged, immutable)
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.ACR_LOGIN }}/frontend:${{ github.sha }} \
            -n ${{ env.K8S_NS }}
          kubectl set image deployment/backend \
            backend=${{ env.ACR_LOGIN }}/backend:${{ github.sha }} \
            -n ${{ env.K8S_NS }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n ${{ env.K8S_NS }} --timeout=3m
          kubectl rollout status deployment/frontend -n ${{ env.K8S_NS }} --timeout=3m

      - name: Show public IP
        run: |
          echo "=============================="
          echo "App deployed. Frontend service:"
          kubectl get service frontend-service -n ${{ env.K8S_NS }}
          echo "=============================="
